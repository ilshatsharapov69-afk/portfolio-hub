<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philippines Living Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="light-mode">

<div id="sidebar">
    <h1>Philippines Living Map</h1>
    <div class="settings-bar">
        <label class="switch theme-switch" title="Theme">
            <input type="checkbox" id="theme-toggle">
            <span class="slider">
                <span class="ic ic-sun">☀</span>
                <span class="ic ic-moon">🌙</span>
            </span>
        </label>
        <div class="segmented lang-seg" role="group" aria-label="Language">
            <button type="button" class="seg-opt" data-lang="ru">RU</button>
            <button type="button" class="seg-opt" data-lang="en">EN</button>
            <input type="checkbox" id="lang-toggle">
        </div>
    </div>
    <p data-i18n="subtitle" style="font-size:10px;color:var(--text-muted);text-align:center;">Top 200 places to live in Philippines</p>

    <details class="sec" open>
        <summary class="sec-head">
            <span class="sec-icon">🛡️</span>
            <span class="sec-title" data-i18n="section_hazards">Safety (layers)</span>
            <span class="sec-count" id="count-hazards">0</span>
        </summary>
        <div class="year-range">
            <div class="yr-head">
                <span data-i18n="yr_title">Time range</span>
                <span class="yr-badge"><span id="yr-from-val">2016</span> — <span id="yr-to-val">2026</span></span>
            </div>
            <div class="yr-row">
                <label data-i18n="yr_from">From</label>
                <input type="range" id="year-from" min="1900" max="2026" value="2016">
            </div>
            <div class="yr-row">
                <label data-i18n="yr_to">To</label>
                <input type="range" id="year-to" min="1900" max="2026" value="2026">
            </div>
        </div>
        <div id="hazard-toggles" class="hazard-toggles"></div>
        <div id="hazard-legend" class="hazard-legend">
            <span data-i18n="hazard_hint" style="font-size:9px;color:var(--text-dim);">Points = real incidents | Heatmap = density</span>
        </div>
        <div id="hazard-status" class="poi-status"></div>
    </details>

    <details class="sec" open>
        <summary class="sec-head">
            <span class="sec-icon">🎯</span>
            <span class="sec-title" data-i18n="section_factors">Evaluation Criteria</span>
            <span class="sec-count" id="count-factors">0</span>
        </summary>
        <div class="hazard-toggle locations-toggle">
            <input type="checkbox" id="show-locations">
            <span>📍 <span data-i18n="show_locations">Show locations</span></span>
        </div>
        <div id="location-ui">
            <div id="sliders" class="slider-group"></div>
            <div class="presets">
                <button type="button" data-preset="family" data-i18n="preset_family">👨‍👩‍👧 Family</button>
                <button type="button" data-preset="nomad"  data-i18n="preset_nomad">💻 Digital Nomad</button>
                <button type="button" data-preset="retreat" data-i18n="preset_retreat">🏖️ Retreat</button>
            </div>
            <button id="reset-btn" data-i18n="reset_btn">Reset</button>

            <div style="text-align:center">
                <div class="legend-gradient"></div>
                <div class="legend-labels"><span data-i18n="legend_bad">Poor</span><span data-i18n="legend_mid">Average</span><span data-i18n="legend_good">Excellent</span></div>
            </div>
        </div><!-- /location-ui -->
    </details>

    <details class="sec" open>
        <summary class="sec-head">
            <span class="sec-icon">🏙️</span>
            <span class="sec-title" data-i18n="section_poi">Infrastructure & Services</span>
            <span class="sec-count" id="count-poi">0</span>
        </summary>
        <div id="poi-toggles" class="poi-toggles"></div>
        <div id="poi-status" class="poi-status"></div>
    </details>

    <div id="rankings-ui" class="sec sec-plain">
        <div class="sec-head sec-head-static">
            <span class="sec-icon">🏆</span>
            <span class="sec-title" data-i18n="section_rankings">Location Rankings</span>
            <span class="sec-count" id="count-rankings"></span>
        </div>
        <div id="rankings"></div>
    </div>
</div>

<div id="map"></div>
<button id="toggle-sidebar">☰</button>

<!-- CDN Libraries -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<!-- Data -->
<script src="js/data/factors.js"></script>
<script src="js/data/locations.js"></script>
<script src="js/data/islands.js"></script>
<script src="js/data/hazard-events.js"></script>
<script src="js/data/poi-config.js"></script>
<script src="js/data/attractions.js"></script>
<script src="js/data/beach-data.js"></script>
<script src="js/data/hazard-config.js"></script>
<script src="js/data/weather-data.js"></script>

<!-- i18n + Theme (before logic) -->
<script src="js/i18n.js"></script>
<script src="js/theme.js"></script>

<!-- Logic -->
<script src="js/scoring.js"></script>
<script src="js/overpass.js"></script>
<script src="js/hiking-render.js"></script>
<script src="js/poi-render.js"></script>
<script src="js/hazard-render.js"></script>
<script src="js/hazard-volcano.js"></script>
<script src="js/hazard-typhoon.js"></script>
<script src="js/hazard-point.js"></script>
<script src="js/hazard-weather.js"></script>
<script src="js/map-init.js"></script>
<script src="js/sidebar.js"></script>

<!-- App Entry -->
<script src="js/app.js"></script>
</body>
</html>
