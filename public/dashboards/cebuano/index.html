<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cebuano / Bisaya — Learn Dashboard v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f1a;
  --card-bg: #1a1a2e;
  --card-hover: #222240;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --green: #4ecdc4;
  --orange: #ffbe76;
  --red: #ff6b6b;
  --blue: #74b9ff;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --noun-color: #74b9ff;
  --verb-color: #ff6b6b;
  --adj-color: #4ecdc4;
  --phrase-color: #ffbe76;
  --pronoun-color: #a29bfe;
  --question-color: #fd79a8;
  --connector-color: #81ecec;
  --number-color: #ffeaa7;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}

.header { text-align: center; padding: 20px 0 15px; }
.header h1 {
  font-size: 2.2em;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 5px;
}
.header p { color: var(--text-dim); font-size: 1em; }

/* Stats bar */
.stats-bar { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 15px 0 20px; }
.stat-card {
  background: var(--card-bg); border-radius: 12px; padding: 12px 20px;
  text-align: center; min-width: 100px;
}
.stat-card .number { font-size: 1.8em; font-weight: 700; color: var(--accent); }
.stat-card .label { font-size: 0.8em; color: var(--text-dim); margin-top: 3px; }
.stat-card.due .number { color: var(--accent2); }
.stat-card.learned .number { color: var(--green); }
.stat-card.streak .number { color: var(--orange); }
.stat-card.combo .number { color: #ffeaa7; }

/* Progress bar */
.progress-container { max-width: 600px; margin: 0 auto 20px; }
.progress-bar-bg { background: var(--card-bg); border-radius: 10px; height: 16px; overflow: hidden; }
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 10px; transition: width 0.5s ease;
}
.progress-label { text-align: center; color: var(--text-dim); font-size: 0.85em; margin-top: 5px; }

/* Tabs */
.tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
.tab {
  padding: 9px 18px; border-radius: 8px; border: 1px solid #333;
  background: var(--card-bg); color: var(--text); cursor: pointer; font-size: 0.95em; transition: all 0.2s;
}
.tab:hover { background: var(--card-hover); }
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab .badge {
  background: var(--accent2); color: #fff; border-radius: 10px;
  padding: 1px 7px; font-size: 0.75em; margin-left: 5px;
}

/* Category filters */
.filters { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 14px; border-radius: 20px; border: 1px solid #444;
  background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.8em; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Word cards grid */
.cards-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px; max-width: 1200px; margin: 0 auto; padding-bottom: 30px;
}
.word-card {
  background: var(--card-bg); border-radius: 14px; padding: 18px;
  cursor: pointer; transition: all 0.3s; border-left: 4px solid var(--accent); position: relative;
}
.word-card:hover { background: var(--card-hover); transform: translateY(-2px); }
.word-card.noun { border-left-color: var(--noun-color); }
.word-card.verb { border-left-color: var(--verb-color); }
.word-card.adjective { border-left-color: var(--adj-color); }
.word-card.phrase { border-left-color: var(--phrase-color); }
.word-card.pronoun { border-left-color: var(--pronoun-color); }
.word-card.question { border-left-color: var(--question-color); }
.word-card.connector { border-left-color: var(--connector-color); }
.word-card.number { border-left-color: var(--number-color); }
.word-card .emoji { font-size: 2.2em; margin-bottom: 8px; }
.word-card .cebuano { font-size: 1.5em; font-weight: 700; margin-bottom: 3px; }
.word-card .pronunciation { color: var(--text-dim); font-size: 0.9em; margin-bottom: 6px; }
.word-card .english { font-size: 1em; color: var(--green); margin-bottom: 5px; }
.word-card .example-text { font-size: 0.8em; color: var(--blue); font-style: italic; display: none; margin-bottom: 4px; }
.word-card .mnemonic { font-size: 0.8em; color: var(--orange); font-style: italic; display: none; }
.word-card.flipped .mnemonic, .word-card.flipped .example-text { display: block; }
.word-card .category-badge {
  position: absolute; top: 8px; right: 8px; font-size: 0.7em;
  padding: 2px 7px; border-radius: 10px; background: rgba(255,255,255,0.1); color: var(--text-dim);
}
.word-card .sr-info { position: absolute; bottom: 8px; right: 8px; font-size: 0.7em; color: var(--text-dim); }
.word-card .audio-btn {
  position: absolute; top: 8px; right: 60px; background: none; border: none;
  color: var(--text-dim); cursor: pointer; font-size: 1.1em; padding: 2px 6px;
}
.word-card .audio-btn:hover { color: var(--accent); }
.word-card .level-dots { display: flex; gap: 3px; margin-top: 8px; }
.level-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; }
.level-dot.filled { background: var(--green); }

/* ========== DAILY SESSION ========== */
.daily-container { display: none; max-width: 550px; margin: 0 auto; text-align: center; }
.daily-welcome {
  background: var(--card-bg); border-radius: 20px; padding: 40px 30px;
}
.daily-welcome h2 { font-size: 1.8em; margin-bottom: 15px; }
.daily-plan {
  display: flex; gap: 15px; justify-content: center; margin: 20px 0;
}
.daily-plan-item {
  background: var(--bg); border-radius: 12px; padding: 15px 20px; min-width: 120px;
}
.daily-plan-item .num { font-size: 2em; font-weight: 700; }
.daily-plan-item .lbl { font-size: 0.85em; color: var(--text-dim); margin-top: 3px; }
.daily-plan-item.learn .num { color: var(--blue); }
.daily-plan-item.review .num { color: var(--orange); }
.daily-plan-item.quiz .num { color: var(--green); }
.daily-start-btn {
  margin-top: 20px; padding: 14px 40px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-size: 1.15em; font-weight: 600; cursor: pointer; transition: transform 0.2s;
}
.daily-start-btn:hover { transform: scale(1.05); }

/* Phase indicator */
.phase-indicator {
  display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; align-items: center;
}
.phase-step {
  width: 10px; height: 10px; border-radius: 50%; background: #333;
}
.phase-step.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); width: 12px; height: 12px; }
.phase-step.done { background: var(--green); }
.phase-label { color: var(--text-dim); font-size: 0.9em; margin-left: 8px; }

/* ========== LEARN MODE ========== */
.learn-container { display: none; max-width: 550px; margin: 0 auto; text-align: center; }
.learn-card {
  background: var(--card-bg); border-radius: 20px; padding: 40px 30px; min-height: 400px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.learn-card .step-label {
  font-size: 0.8em; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px;
}
.learn-card .emoji { font-size: 4em; margin-bottom: 15px; }
.learn-card .cebuano { font-size: 2.5em; font-weight: 700; margin-bottom: 5px; }
.learn-card .pronunciation { color: var(--text-dim); font-size: 1.1em; margin-bottom: 12px; }
.learn-card .english { font-size: 1.4em; color: var(--green); margin-bottom: 10px; }
.learn-card .mnemonic { color: var(--orange); font-style: italic; margin-bottom: 10px; font-size: 0.95em; }
.learn-card .example { color: var(--blue); font-style: italic; font-size: 0.95em; margin-bottom: 5px; }
.learn-card .example-trans { color: var(--text-dim); font-size: 0.85em; margin-bottom: 15px; }
.learn-card .hidden-field {
  background: var(--bg); border-radius: 8px; padding: 12px 20px; margin: 8px 0;
  cursor: pointer; color: var(--text-dim); font-size: 1em; min-width: 200px;
}
.learn-card .hidden-field:hover { background: #222; }
.learn-card .hidden-field.revealed { background: transparent; cursor: default; }

.learn-btn {
  margin-top: 15px; padding: 12px 35px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff; font-size: 1em; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.learn-btn:hover { transform: scale(1.05); }
.learn-btn.next { background: var(--green); color: #333; }

.learn-progress { margin-top: 12px; color: var(--text-dim); font-size: 0.85em; }

/* ========== STUDY (SRS REVIEW) ========== */
.flashcard-container { display: none; max-width: 550px; margin: 0 auto; text-align: center; }
.flashcard {
  background: var(--card-bg); border-radius: 20px; padding: 45px 35px; min-height: 350px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
}
.flashcard .emoji { font-size: 3.5em; margin-bottom: 15px; }
.flashcard .cebuano { font-size: 2.3em; font-weight: 700; margin-bottom: 8px; }
.flashcard .pronunciation { color: var(--text-dim); font-size: 1.1em; margin-bottom: 12px; }
.flashcard .english { font-size: 1.4em; color: var(--green); display: none; margin-bottom: 8px; }
.flashcard .mnemonic { color: var(--orange); font-style: italic; display: none; font-size: 0.9em; margin-bottom: 6px; }
.flashcard .example { color: var(--blue); font-style: italic; display: none; font-size: 0.9em; }
.flashcard .hint { color: var(--text-dim); font-size: 0.85em; margin-top: 15px; }
.flashcard .audio-btn-fc {
  position: absolute; top: 15px; right: 15px; background: none; border: none;
  color: var(--text-dim); cursor: pointer; font-size: 1.3em;
}
.flashcard .audio-btn-fc:hover { color: var(--accent); }
.flashcard.revealed .english, .flashcard.revealed .mnemonic, .flashcard.revealed .example { display: block; }
.flashcard.revealed .hint { display: none; }

.flashcard-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
.fc-btn {
  padding: 11px 24px; border-radius: 10px; border: none; font-size: 0.95em;
  cursor: pointer; font-weight: 600; transition: all 0.2s;
}
.fc-btn.again { background: var(--red); color: #fff; }
.fc-btn.hard { background: var(--orange); color: #333; }
.fc-btn.good { background: var(--green); color: #333; }
.fc-btn.easy { background: var(--blue); color: #333; }
.fc-btn:hover { transform: scale(1.05); }
.fc-btn .interval { display: block; font-size: 0.7em; font-weight: 400; opacity: 0.8; }
.flashcard-progress { margin-top: 12px; color: var(--text-dim); font-size: 0.85em; }

/* ========== QUIZ MODE ========== */
.quiz-container { display: none; max-width: 550px; margin: 0 auto; text-align: center; }
.quiz-card { background: var(--card-bg); border-radius: 20px; padding: 35px; margin-bottom: 15px; }
.quiz-card .emoji { font-size: 2.5em; margin-bottom: 12px; }
.quiz-card .question { font-size: 1.6em; font-weight: 700; margin-bottom: 4px; }
.quiz-card .sub-question { font-size: 0.95em; color: var(--text-dim); margin-bottom: 20px; }
.quiz-card .quiz-type-badge {
  display: inline-block; padding: 3px 10px; border-radius: 10px;
  background: rgba(108,99,255,0.2); color: var(--accent); font-size: 0.75em; margin-bottom: 15px;
}
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-option {
  padding: 13px 18px; border-radius: 10px; border: 2px solid #333;
  background: transparent; color: var(--text); font-size: 1.05em;
  cursor: pointer; transition: all 0.2s; text-align: left;
}
.quiz-option:hover { border-color: var(--accent); }
.quiz-option.correct { border-color: var(--green); background: rgba(78,205,196,0.15); }
.quiz-option.wrong { border-color: var(--red); background: rgba(255,107,107,0.15); }

/* Typing quiz */
.typing-input-wrap { position: relative; margin-bottom: 15px; }
.typing-input {
  width: 100%; padding: 14px 18px; border-radius: 10px; border: 2px solid #444;
  background: var(--bg); color: var(--text); font-size: 1.2em; text-align: center;
  outline: none; transition: border-color 0.2s;
}
.typing-input:focus { border-color: var(--accent); }
.typing-input.correct { border-color: var(--green); background: rgba(78,205,196,0.1); }
.typing-input.wrong { border-color: var(--red); background: rgba(255,107,107,0.1); }
.typing-submit {
  margin-top: 10px; padding: 10px 30px; border-radius: 8px; border: none;
  background: var(--accent); color: #fff; font-size: 1em; cursor: pointer;
}

/* Matching quiz */
.match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.match-item {
  padding: 12px; border-radius: 10px; border: 2px solid #333;
  background: transparent; color: var(--text); cursor: pointer; font-size: 0.95em;
  transition: all 0.2s; text-align: center;
}
.match-item:hover { border-color: var(--accent); }
.match-item.selected { border-color: var(--accent); background: rgba(108,99,255,0.15); }
.match-item.matched { border-color: var(--green); background: rgba(78,205,196,0.15); opacity: 0.6; pointer-events: none; }
.match-item.wrong-match { border-color: var(--red); background: rgba(255,107,107,0.15); }

.quiz-result {
  padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 1em; display: none;
}
.quiz-result.show { display: block; }
.quiz-result.correct-result { background: rgba(78,205,196,0.15); color: var(--green); }
.quiz-result.wrong-result { background: rgba(255,107,107,0.15); color: var(--red); }

.quiz-next-btn {
  margin-top: 12px; padding: 10px 28px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff; font-size: 0.95em; cursor: pointer; display: none;
}
.quiz-score { color: var(--text-dim); margin-top: 8px; font-size: 0.85em; }
.combo-display {
  font-size: 0.9em; margin-top: 5px;
}
.combo-display .combo-fire { color: var(--orange); }

/* ========== SENTENCE BUILDER ========== */
.sentence-container { display: none; max-width: 600px; margin: 0 auto; text-align: center; }
.sentence-card { background: var(--card-bg); border-radius: 20px; padding: 30px; }
.sentence-prompt { font-size: 1.2em; margin-bottom: 8px; }
.sentence-translation { color: var(--text-dim); font-size: 0.95em; margin-bottom: 20px; }
.sentence-slots {
  min-height: 55px; border: 2px dashed #444; border-radius: 12px;
  padding: 12px; margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap;
  justify-content: center; align-items: center;
}
.sentence-slots.correct { border-color: var(--green); }
.sentence-slots.wrong { border-color: var(--red); }
.word-chip {
  padding: 8px 16px; border-radius: 8px; background: var(--accent);
  color: #fff; cursor: pointer; font-size: 1em; transition: all 0.2s; user-select: none;
}
.word-chip:hover { transform: scale(1.05); }
.word-chip.in-slot { background: var(--green); color: #333; }
.word-bank {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px;
}
.sentence-check-btn {
  padding: 10px 30px; border-radius: 10px; border: none;
  background: var(--green); color: #333; font-size: 1em; font-weight: 600; cursor: pointer;
}
.sentence-result { margin-top: 12px; font-size: 1em; }
.sentence-next-btn {
  margin-top: 10px; padding: 10px 28px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff; font-size: 0.95em; cursor: pointer; display: none;
}

/* ========== DAILY SUMMARY ========== */
.daily-summary {
  background: var(--card-bg); border-radius: 20px; padding: 40px; text-align: center;
}
.daily-summary h2 { margin-bottom: 15px; }
.daily-summary .big-emoji { font-size: 4em; margin-bottom: 10px; }
.summary-stats { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
.summary-stat { text-align: center; }
.summary-stat .val { font-size: 2em; font-weight: 700; }
.summary-stat .lbl { font-size: 0.85em; color: var(--text-dim); }

/* ========== SETTINGS ========== */
.settings-container { display: none; max-width: 600px; margin: 0 auto; }
.settings-group { background: var(--card-bg); border-radius: 14px; padding: 18px; margin-bottom: 12px; }
.settings-group h3 { margin-bottom: 12px; color: var(--accent); }
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #222;
}
.setting-row:last-child { border-bottom: none; }
.setting-row label { color: var(--text); font-size: 0.95em; }
.setting-row select, .setting-row input[type="number"] {
  background: var(--bg); color: var(--text); border: 1px solid #444;
  border-radius: 6px; padding: 5px 10px; font-size: 0.9em;
}
.reset-btn {
  padding: 8px 20px; border-radius: 8px; border: 2px solid var(--red);
  background: transparent; color: var(--red); cursor: pointer; font-size: 0.9em;
}
.reset-btn:hover { background: var(--red); color: #fff; }

/* Empty state */
.empty-state { text-align: center; padding: 40px; }
.empty-state .big-emoji { font-size: 3em; margin-bottom: 12px; }

/* Mobile */
@media (max-width: 600px) {
  .header h1 { font-size: 1.5em; }
  .stats-bar { gap: 6px; }
  .stat-card { min-width: 75px; padding: 8px 12px; }
  .stat-card .number { font-size: 1.4em; }
  .cards-grid { grid-template-columns: 1fr; }
  .flashcard, .learn-card { padding: 25px 18px; min-height: 280px; }
  .match-grid { grid-template-columns: 1fr; }
  .tabs { gap: 4px; }
  .tab { padding: 7px 12px; font-size: 0.85em; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Cebuano / Bisaya</h1>
  <p id="headerSubtitle">Мнемоника + Интервальные повторения + Активное запоминание</p>
  <div style="margin-top:10px">
    <button id="langRU" class="filter-btn active" onclick="setLang('ru')" style="font-weight:700">🇷🇺 RU</button>
    <button id="langEN" class="filter-btn" onclick="setLang('en')" style="font-weight:700">🇬🇧 EN</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-card"><div class="number" id="totalWords">0</div><div class="label">Всего</div></div>
  <div class="stat-card learned"><div class="number" id="learnedWords">0</div><div class="label">Выучено</div></div>
  <div class="stat-card due"><div class="number" id="dueWords">0</div><div class="label">Повторить</div></div>
  <div class="stat-card streak"><div class="number" id="streakDays">0</div><div class="label">Серия</div></div>
  <div class="stat-card combo"><div class="number" id="todayScore">0</div><div class="label">Сегодня</div></div>
</div>

<div class="progress-container">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 / 0 words learned</div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="daily" onclick="switchTab('daily')">🎯 Сегодня</button>
  <button class="tab" data-tab="learn" onclick="switchTab('learn')">📚 Учить</button>
  <button class="tab" data-tab="review" onclick="switchTab('review')">🧠 Повторять</button>
  <button class="tab" data-tab="quiz" onclick="switchTab('quiz')">✏️ Тест</button>
  <button class="tab" data-tab="sentences" onclick="switchTab('sentences')">💬 Фразы</button>
  <button class="tab" data-tab="browse" onclick="switchTab('browse')">📖 Словарь</button>
  <button class="tab" data-tab="settings" onclick="switchTab('settings')">⚙️</button>
</div>

<!-- DAILY SESSION -->
<div class="daily-container" id="dailyMode"></div>

<!-- LEARN MODE -->
<div class="learn-container" id="learnMode"></div>

<!-- REVIEW (SRS) -->
<div class="flashcard-container" id="reviewMode"></div>

<!-- QUIZ -->
<div class="quiz-container" id="quizMode"></div>

<!-- SENTENCE BUILDER -->
<div class="sentence-container" id="sentenceMode"></div>

<!-- BROWSE -->
<div id="browseMode" style="display:none">
  <div class="filters" id="categoryFilters"></div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- SETTINGS -->
<div class="settings-container" id="settingsMode"></div>

<script>
// ==================== WORD DATABASE ====================
const WORDS = [
  // === Местоимения ===
  { id:1, cebuano:"Ako", pronunciation:"а-КО", english:"я / мне", emoji:"👤", category:"pronoun", mnemonic:"А-КО! — нокаут, это всё про МЕНЯ", example:"Ako si Juan.", exampleEn:"Я — Хуан." },

let currentLang = localStorage.getItem('cebuano_lang') || 'ru';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('cebuano_lang', lang);
  document.getElementById('langRU').classList.toggle('active', lang === 'ru');
  document.getElementById('langEN').classList.toggle('active', lang === 'en');
  refreshUI();
  updateStats();
  // Only re-render browse (safe, no session state). Other modes keep their current view.
  if (currentTab === 'browse') { renderFilters(); renderCards(); }
  if (currentTab === 'settings') refreshSettings();
}

function refreshUI() {
  // Header
  document.getElementById('headerSubtitle').textContent = T('subtitle');
  // Stat labels
  const labels = document.querySelectorAll('.stat-card .label');
  const labelKeys = ['statTotal','statLearned','statDue','statStreak','statToday'];
  labels.forEach((el, i) => { if (labelKeys[i]) el.textContent = T(labelKeys[i]); });
  // Tabs
  const tabKeys = ['tabDaily','tabLearn','tabReview','tabQuiz','tabSentences','tabBrowse'];
  const tabs = document.querySelectorAll('.tab[data-tab]');
  tabs.forEach(tab => {
    const map = { daily:'tabDaily', learn:'tabLearn', review:'tabReview', quiz:'tabQuiz', sentences:'tabSentences', browse:'tabBrowse' };
    const key = map[tab.dataset.tab];
    if (key) tab.textContent = T(key);
  });
  // Settings
  refreshSettings();
}

// ==================== SM-2 ALGORITHM ====================
function getDefaultSR() {
  return { interval: 0, repetition: 0, efactor: 2.5, dueDate: Date.now(), lastReview: null };
}

function sm2(sr, quality) {
  const q = quality + 2;
  let { interval, repetition, efactor } = sr;
  if (q < 3) { repetition = 0; interval = 0; }
  else {
    if (repetition === 0) interval = 1;
    else if (repetition === 1) interval = 3;
    else interval = Math.round(interval * efactor);
    repetition++;
  }
  efactor = efactor + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));
  if (efactor < 1.3) efactor = 1.3;
  return { interval, repetition, efactor, dueDate: Date.now() + interval * 86400000, lastReview: Date.now() };
}

function previewInterval(sr, quality) {
  const result = sm2({...sr}, quality);
  if (result.interval === 0) return '<1d';
  if (result.interval === 1) return '1d';
  return result.interval + 'd';
}

let state = loadState();

function loadState() {
  const saved = localStorage.getItem('cebuano_v2');
  if (saved) return JSON.parse(saved);
  return {
    sr: {}, settings: { newPerDay: 5, quizCount: 10, quizDirection: 'mixed', autoAudio: 'on' },
    streak: { count: 0, lastDate: null }, introduced: [], todayStats: { date: null, learned: 0, reviewed: 0, quizzed: 0 }
  };
}
function saveState() {
  const json = JSON.stringify(state);
  localStorage.setItem('cebuano_v2', json);
  // Auto-save backup to file via hidden link trick
  autoBackupToFile(json);
}

let _backupTimer = null;
function autoBackupToFile(json) {
  // Debounce: save file max once per 5 seconds
  if (_backupTimer) clearTimeout(_backupTimer);
  _backupTimer = setTimeout(() => {
    try {
      const blob = new Blob([json], {type: 'application/json'});
      // Use File System Access API if available (Chrome 86+)
      if (window._backupFileHandle) {
        window._backupFileHandle.createWritable().then(w => {
          w.write(blob).then(() => w.close());
        }).catch(() => {});
      }
    } catch(e) {}
  }, 5000);
}

function exportProgress() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cebuano-progress-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (imported.sr && imported.settings) {
          state = imported;
          saveState();
          updateStats();
          switchTab('daily');
          alert(currentLang === 'ru' ? 'Прогресс восстановлен!' : 'Progress restored!');
        } else {
          alert(currentLang === 'ru' ? 'Неверный формат файла' : 'Invalid file format');
        }
      } catch(err) {
        alert(currentLang === 'ru' ? 'Ошибка чтения файла' : 'Error reading file');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ==================== AUDIO ====================
let availableVoice = null;
let voiceChecked = false;

function findBestVoice() {
  if (voiceChecked) return availableVoice;
  const voices = speechSynthesis.getVoices();
  if (voices.length === 0) return null;
  voiceChecked = true;
  // Priority: Cebuano > Filipino > Tagalog > Malay/Indonesian (similar phonology) > Spanish (many loanwords)
  const priorities = ['ceb', 'fil', 'tl', 'ms', 'id', 'es'];
  for (const code of priorities) {
    const v = voices.find(v => v.lang.startsWith(code));
    if (v) { availableVoice = v; return v; }
  }
  return null;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voice = findBestVoice();
  if (voice) {
    u.voice = voice;
    u.lang = voice.lang;
  } else {
    // Fallback: use Spanish — Cebuano has many Spanish loanwords, similar vowel system
    u.lang = 'es-ES';
  }
  u.rate = 0.75;
  u.pitch = 1.0;
  speechSynthesis.speak(u);
}

// Load voices (async in some browsers)
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { voiceChecked = false; findBestVoice(); };
  // Try immediately too
  findBestVoice();
}

// ==================== STREAK ====================
function updateStreak() {
  const today = new Date().toDateString();
  if (state.streak.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  state.streak.count = (state.streak.lastDate === yesterday) ? state.streak.count + 1 : 1;
  state.streak.lastDate = today;
  saveState();
}

// ==================== STATS ====================
function getNewWords() {
  return WORDS.filter(w => !(state.introduced || []).includes(w.id));
}
function getDueWords() {
  const now = Date.now();
  return WORDS.filter(w => {
    const sr = getSR(w.id);
    return sr.lastReview && sr.dueDate <= now;
  });
}
function getLearnedCount() {
  return WORDS.filter(w => getSR(w.id).repetition >= 3).length;
}

function updateStats() {
  const total = WORDS.length;
  const learned = getLearnedCount();
  const dueCount = getDueWords().length;
  const newAvail = Math.min(getNewWords().length, state.settings.newPerDay);
  const ts = getTodayStats();

  document.getElementById('totalWords').textContent = total;
  document.getElementById('learnedWords').textContent = learned;
  document.getElementById('dueWords').textContent = dueCount + newAvail;
  document.getElementById('streakDays').textContent = state.streak.count;
  document.getElementById('todayScore').textContent = ts.learned + ts.reviewed + ts.quizzed;

  const pct = total > 0 ? Math.round((learned / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = T('progressLabel')(learned, total, pct);
}

}

// ==================== LEARN MODE ====================
let learnQueue = [];
let learnIndex = 0;
let learnStep = 0; // 0=full, 1=hide english, 2=hide mnemonic too

function initLearn() {
  const el = document.getElementById('learnMode');
  const newWords = getNewWords().slice(0, state.settings.newPerDay);

  if (newWords.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="big-emoji">✅</div><h2>${T('learnNoNew')}</h2>
      <p style="color:var(--text-dim);margin-top:10px">${T('learnNoNewSub')}</p></div>`;
    return;
  }

  // Each word appears 3 times with increasing difficulty
  learnQueue = [];
  newWords.forEach(w => {
    learnQueue.push({ word: w, step: 0 }); // full show
  });
  newWords.forEach(w => {
    learnQueue.push({ word: w, step: 1 }); // hide english
  });
  newWords.forEach(w => {
    learnQueue.push({ word: w, step: 2 }); // hide english + mnemonic
  });

  learnIndex = 0;
  showLearnCard();
}

function showLearnCard() {
  const el = document.getElementById('learnMode');

  if (learnIndex >= learnQueue.length) {
    // Done learning
    const ts = getTodayStats();
    el.innerHTML = `<div class="empty-state"><div class="big-emoji">🧠</div><h2>${T('learnDone')}</h2>
      <p style="color:var(--text-dim);margin-top:10px">${T('learnDoneSub')(ts.learned)}</p>
      <button class="learn-btn next" style="margin-top:20px" onclick="switchTab('review')">${T('learnToReview')}</button></div>`;
    updateStats();
    return;
  }

  const { word: w, step } = learnQueue[learnIndex];
  const t = getTranslation(w);
  const totalSteps = learnQueue.length;
  const stepLabels = T('learnSteps');
  const stepLabel = stepLabels[step];

  let englishHtml, mnemonicHtml;
  if (step === 0) {
    englishHtml = `<div class="english">${t.english}</div>`;
    mnemonicHtml = `<div class="mnemonic">💡 ${t.mnemonic}</div>`;
  } else if (step === 1) {
    englishHtml = `<div class="hidden-field" id="hiddenEnglish" onclick="this.innerHTML='${t.english}';this.classList.add('revealed');this.style.color='var(--green)';this.style.fontSize='1.3em'">${T('learnRevealMeaning')}</div>`;
    mnemonicHtml = `<div class="mnemonic">💡 ${t.mnemonic}</div>`;
  } else {
    englishHtml = `<div class="hidden-field" id="hiddenEnglish" onclick="this.innerHTML='${t.english}';this.classList.add('revealed');this.style.color='var(--green)';this.style.fontSize='1.3em'">${T('learnRevealMeaning')}</div>`;
    mnemonicHtml = `<div class="hidden-field" onclick="this.innerHTML='💡 ${t.mnemonic.replace(/'/g,"\\'")}';this.classList.add('revealed');this.style.color='var(--orange)'">${T('learnRevealHint')}</div>`;
  }

  el.innerHTML = `
    <div class="learn-card">
      <div class="step-label">${stepLabel}</div>
      <div class="emoji">${w.emoji}</div>
      <div class="cebuano">${w.cebuano}</div>
      <div class="pronunciation">[${t.pronunciation}]</div>
      <button class="audio-btn-fc" onclick="event.stopPropagation();speak('${w.cebuano}')" title="Listen">🔊</button>
      ${englishHtml}
      ${mnemonicHtml}
      <div class="example">"${w.example}"</div>
      <div class="example-trans">${t.exampleEn}</div>
      <button class="learn-btn next" onclick="nextLearnCard()">${T('learnGotIt')}</button>
    </div>
    <div class="learn-progress">${learnIndex + 1} / ${totalSteps}</div>`;

  if (state.settings.autoAudio === 'on') speak(w.cebuano);
}

function nextLearnCard() {
  const { word } = learnQueue[learnIndex];

  // Mark as introduced after first encounter (step 0)
  if (learnQueue[learnIndex].step === 0) {
    if (!state.introduced) state.introduced = [];
    if (!state.introduced.includes(word.id)) {
      state.introduced.push(word.id);
      state.sr[word.id] = getDefaultSR();
      const ts = getTodayStats();
      ts.learned++;
      updateStreak();
      saveState();
    }
  }

  learnIndex++;
  showLearnCard();
}

// ==================== REVIEW (SRS) ====================
let reviewQueue = [];
let reviewIndex = 0;

function initReview() {
  const el = document.getElementById('reviewMode');
  const due = getDueWords();

  // Also include newly introduced words that haven't been reviewed yet
  const newlyIntro = WORDS.filter(w => {
    const sr = getSR(w.id);
    return (state.introduced || []).includes(w.id) && !sr.lastReview;
  });

  reviewQueue = [...due, ...newlyIntro];
  for (let i = reviewQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [reviewQueue[i], reviewQueue[j]] = [reviewQueue[j], reviewQueue[i]];
  }
  reviewIndex = 0;

  if (reviewQueue.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="big-emoji">🎉</div><h2>${T('reviewDone')}</h2>
      <p style="color:var(--text-dim);margin-top:10px">${T('reviewDoneSub')}</p>
      <button class="learn-btn" style="margin-top:20px" onclick="switchTab('quiz')">${T('reviewToQuiz')}</button></div>`;
    return;
  }

  showReviewCard();
}

function showReviewCard() {
  const el = document.getElementById('reviewMode');

  if (reviewIndex >= reviewQueue.length) {
    const ts = getTodayStats();
    el.innerHTML = `<div class="empty-state"><div class="big-emoji">🎉</div><h2>${T('reviewComplete')}</h2>
      <p style="color:var(--text-dim);margin-top:10px">${T('reviewCompleteSub')(ts.reviewed)}</p>
      <button class="learn-btn next" style="margin-top:20px" onclick="switchTab('quiz')">${T('reviewToQuiz')}</button></div>`;
    updateStats();
    return;
  }

  const w = reviewQueue[reviewIndex];
  const t = getTranslation(w);
  const sr = getSR(w.id);

  el.innerHTML = `
    <div class="flashcard" id="flashcard" onclick="document.getElementById('flashcard').classList.add('revealed');document.getElementById('fcButtons').style.display='flex'">
      <button class="audio-btn-fc" onclick="event.stopPropagation();speak('${w.cebuano}')" title="Listen">🔊</button>
      <div class="emoji">${w.emoji}</div>
      <div class="cebuano">${w.cebuano}</div>
      <div class="pronunciation">[${t.pronunciation}]</div>
      <div class="english">${t.english}</div>
      <div class="mnemonic">💡 ${t.mnemonic}</div>
      <div class="example" style="display:none">"${w.example}" — ${t.exampleEn}</div>
      <div class="hint">${T('revealHint')}</div>
    </div>
    <div class="flashcard-buttons" id="fcButtons" style="display:none">
      <button class="fc-btn again" onclick="rateReview(0)">${T('btnAgain')}<span class="interval">${previewInterval(sr,0)}</span></button>
      <button class="fc-btn hard" onclick="rateReview(1)">${T('btnHard')}<span class="interval">${previewInterval(sr,1)}</span></button>
      <button class="fc-btn good" onclick="rateReview(2)">${T('btnGood')}<span class="interval">${previewInterval(sr,2)}</span></button>
      <button class="fc-btn easy" onclick="rateReview(3)">${T('btnEasy')}<span class="interval">${previewInterval(sr,3)}</span></button>
    </div>
    <div class="flashcard-progress">${reviewIndex + 1} / ${reviewQueue.length}</div>`;

  if (state.settings.autoAudio === 'on') speak(w.cebuano);
}

function rateReview(quality) {
  const w = reviewQueue[reviewIndex];
  state.sr[w.id] = sm2(getSR(w.id), quality);
  const ts = getTodayStats();
  ts.reviewed++;
  updateStreak();
  saveState();

  if (quality === 0) reviewQueue.push(w);
  reviewIndex++;
  showReviewCard();
}

// ==================== QUIZ ====================
let quizData = [];
let quizIdx = 0;
let quizCorrect = 0;
let quizCombo = 0;
let quizMaxCombo = 0;
let matchSelected = null;
let matchPairs = {};

function initQuiz() {
  const el = document.getElementById('quizMode');
  const available = WORDS.filter(w => (state.introduced || []).includes(w.id));

  if (available.length < 4) {
    el.innerHTML = `<div class="empty-state"><div class="big-emoji">📚</div><h2>${T('quizNeedMore')}</h2>
      <p style="color:var(--text-dim);margin-top:10px">${T('quizNeedMoreSub')}</p></div>`;
    return;
  }

  const count = Math.min(state.settings.quizCount, available.length);
  const shuffled = [...available].sort(() => Math.random() - 0.5);
  quizData = shuffled.slice(0, count).map(w => {
    // Assign random quiz type
    const types = ['choice'];
    if (available.length >= 8) types.push('matching');
    types.push('typing');
    const type = types[Math.floor(Math.random() * types.length)];
    return { word: w, type };
  });

  quizIdx = 0;
  quizCorrect = 0;
  quizCombo = 0;
  quizMaxCombo = 0;
  showQuizQuestion();
}

function showQuizQuestion() {
  const el = document.getElementById('quizMode');

  if (quizIdx >= quizData.length) {
    const pct = Math.round((quizCorrect / quizData.length) * 100);
    const ts = getTodayStats();
    ts.quizzed += quizData.length;
    saveState();
    updateStats();
    el.innerHTML = `
      <div class="quiz-card">
        <div style="font-size:4em;margin-bottom:15px">${pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '💪'}</div>
        <h2>${quizCorrect} / ${quizData.length} correct (${pct}%)</h2>
        <p style="color:var(--text-dim);margin-top:8px">${T('quizMaxCombo')}: ${quizMaxCombo} 🔥</p>
        <p style="color:var(--text-dim);margin-top:5px">${pct >= 80 ? T('quizExcellent') : pct >= 50 ? T('quizGoodJob') : T('quizKeepGoing')}</p>
        <button class="learn-btn" style="margin-top:20px" onclick="initQuiz()">${T('quizTryAgain')}</button>
      </div>`;
    return;
  }

  const { word: w, type } = quizData[quizIdx];
  const available = WORDS.filter(x => (state.introduced || []).includes(x.id));
  const dir = state.settings.quizDirection;
  const isReverse = dir === 'english-cebuano' || (dir === 'mixed' && Math.random() > 0.5);

  const comboHtml = quizCombo >= 2 ? `<div class="combo-display"><span class="combo-fire">🔥 ${quizCombo} combo!</span></div>` : '';

  if (type === 'choice') {
    const tw = getTranslation(w);
    const pool = available.filter(x => x.id !== w.id).sort(() => Math.random() - 0.5).slice(0, 3);
    const options = [...pool, w].sort(() => Math.random() - 0.5);

    el.innerHTML = `
      <div class="quiz-card">
        <div class="quiz-type-badge">${T('quizChoice')}</div>
        <div class="emoji">${w.emoji}</div>
        <div class="question">${isReverse ? tw.english : w.cebuano}</div>
        <div class="sub-question">${isReverse ? T('quizRevQ') : T('quizCebQ')(tw.pronunciation)}</div>
        <div class="quiz-options">${options.map(o => {
          const to = getTranslation(o);
          const label = isReverse ? o.cebuano : to.english;
          return `<button class="quiz-option" onclick="checkChoice(this,${o.id},${w.id})">${label}</button>`;
        }).join('')}</div>
        <div class="quiz-result" id="qzResult"></div>
        <button class="quiz-next-btn" id="qzNext" onclick="quizIdx++;showQuizQuestion()">${T('quizNext')}</button>
      </div>
      <div class="quiz-score">${T('quizQuestion')(quizIdx+1,quizData.length)} | ${T('quizScore')} ${quizCorrect} ${comboHtml}</div>`;
  } else if (type === 'typing') {
    const tw = getTranslation(w);
    el.innerHTML = `
      <div class="quiz-card">
        <div class="quiz-type-badge">${T('quizTyping')}</div>
        <div class="emoji">${w.emoji}</div>
        <div class="question">${isReverse ? tw.english : w.cebuano}</div>
        <div class="sub-question">${isReverse ? T('quizTypeQ') : T('quizTypeMeanQ')}</div>
        <div class="typing-input-wrap">
          <input class="typing-input" id="typingInput" placeholder="${T('quizPlaceholder')}" autocomplete="off"
            onkeydown="if(event.key==='Enter')checkTyping(${w.id},${isReverse})">
        </div>
        <button class="typing-submit" onclick="checkTyping(${w.id},${isReverse})">${T('quizCheck')}</button>
        <div class="quiz-result" id="qzResult"></div>
        <button class="quiz-next-btn" id="qzNext" onclick="quizIdx++;showQuizQuestion()">${T('quizNext')}</button>
      </div>
      <div class="quiz-score">${T('quizQuestion')(quizIdx+1,quizData.length)} | ${T('quizScore')} ${quizCorrect} ${comboHtml}</div>`;
    setTimeout(() => document.getElementById('typingInput')?.focus(), 100);
  } else if (type === 'matching') {
    const pool = available.filter(x => x.id !== w.id).sort(() => Math.random() - 0.5).slice(0, 3);
    const matchWords = [w, ...pool];
    const cebuanoSide = [...matchWords].sort(() => Math.random() - 0.5);
    const englishSide = [...matchWords].sort(() => Math.random() - 0.5);
    matchSelected = null;
    matchPairs = {};

    el.innerHTML = `
      <div class="quiz-card">
        <div class="quiz-type-badge">${T('quizMatch')}</div>
        <div class="sub-question">${T('quizMatchSub')}</div>
        <div class="match-grid" id="matchGrid">
          ${cebuanoSide.map(x => `<div class="match-item" data-id="${x.id}" data-side="ceb" onclick="matchClick(this)">${x.cebuano}</div>`).join('')}
          ${englishSide.map(x => `<div class="match-item" data-id="${x.id}" data-side="eng" onclick="matchClick(this)">${getTranslation(x).english}</div>`).join('')}
        </div>
        <div class="quiz-result" id="qzResult"></div>
        <button class="quiz-next-btn" id="qzNext" onclick="quizIdx++;showQuizQuestion()">${T('quizNext')}</button>
      </div>
      <div class="quiz-score">${T('quizQuestion')(quizIdx+1,quizData.length)} | ${T('quizScore')} ${quizCorrect} ${comboHtml}</div>`;
  }
}

function checkChoice(btn, selectedId, correctId) {
  document.querySelectorAll('.quiz-option').forEach(b => { b.disabled = true; b.style.pointerEvents = 'none'; });
  const correct = selectedId === correctId;
  const w = WORDS.find(x => x.id === correctId);
  const tw = getTranslation(w);

  if (correct) {
    btn.classList.add('correct');
    quizCorrect++;
    quizCombo++;
    if (quizCombo > quizMaxCombo) quizMaxCombo = quizCombo;
    document.getElementById('qzResult').className = 'quiz-result show correct-result';
    document.getElementById('qzResult').textContent = T('quizCorrect');
  } else {
    btn.classList.add('wrong');
    quizCombo = 0;
    document.querySelectorAll('.quiz-option').forEach(b => {
      if (b.textContent === w.cebuano || b.textContent === tw.english) b.classList.add('correct');
    });
    document.getElementById('qzResult').className = 'quiz-result show wrong-result';
    document.getElementById('qzResult').textContent = `❌ ${w.cebuano} = ${tw.english}`;
  }
  document.getElementById('qzNext').style.display = 'inline-block';
}

function checkTyping(wordId, isReverse) {
  const input = document.getElementById('typingInput');
  const w = WORDS.find(x => x.id === wordId);
  const tw = getTranslation(w);
  const answer = input.value.trim().toLowerCase();
  const correctAnswers = isReverse
    ? [w.cebuano.toLowerCase()]
    : tw.english.toLowerCase().split(' / ').map(s => s.trim());

  const correct = correctAnswers.some(c => answer === c || answer === c.replace(/[()]/g, '').trim());

  input.disabled = true;
  if (correct) {
    input.classList.add('correct');
    quizCorrect++;
    quizCombo++;
    if (quizCombo > quizMaxCombo) quizMaxCombo = quizCombo;
    document.getElementById('qzResult').className = 'quiz-result show correct-result';
    document.getElementById('qzResult').textContent = T('quizCorrect');
  } else {
    input.classList.add('wrong');
    quizCombo = 0;
    document.getElementById('qzResult').className = 'quiz-result show wrong-result';
    document.getElementById('qzResult').innerHTML = `❌ ${T('quizWrongAnswer')} <strong>${isReverse ? w.cebuano : tw.english}</strong>`;
  }
  document.getElementById('qzNext').style.display = 'inline-block';
}

function matchClick(el) {
  const id = el.dataset.id;
  const side = el.dataset.side;

  if (el.classList.contains('matched')) return;

  if (!matchSelected) {
    matchSelected = { el, id, side };
    el.classList.add('selected');
  } else {
    if (matchSelected.side === side) {
      matchSelected.el.classList.remove('selected');
      matchSelected = { el, id, side };
      el.classList.add('selected');
      return;
    }

    if (matchSelected.id === id) {
      // Correct match
      matchSelected.el.classList.remove('selected');
      matchSelected.el.classList.add('matched');
      el.classList.add('matched');
      matchPairs[id] = true;

      // Check if all matched
      const totalPairs = document.querySelectorAll('.match-item[data-side="ceb"]').length;
      if (Object.keys(matchPairs).length === totalPairs) {
        quizCorrect++;
        quizCombo++;
        if (quizCombo > quizMaxCombo) quizMaxCombo = quizCombo;
        document.getElementById('qzResult').className = 'quiz-result show correct-result';
        document.getElementById('qzResult').textContent = T('quizAllMatched');
        document.getElementById('qzNext').style.display = 'inline-block';
      }
    } else {
      // Wrong match
      el.classList.add('wrong-match');
      matchSelected.el.classList.add('wrong-match');
      setTimeout(() => {
        el.classList.remove('wrong-match', 'selected');
        matchSelected.el.classList.remove('wrong-match', 'selected');
        matchSelected = null;
      }, 600);
      return;
    }
    matchSelected = null;
  }
}

// ==================== SENTENCE BUILDER ====================
let sentIdx = 0;
let sentSlots = [];

function initSentences() {
  sentIdx = 0;
  showSentence();
}

function showSentence() {
  const el = document.getElementById('sentenceMode');

  if (sentIdx >= SENTENCES.length) sentIdx = 0;
  const s = SENTENCES[sentIdx];
  sentSlots = [];

  const shuffled = [...s.words].sort(() => Math.random() - 0.5);

  el.innerHTML = `
    <div class="sentence-card">
      <div class="sentence-prompt">${T('sentBuild')}</div>
      <div class="sentence-translation">"${s.english}"</div>
      <div class="sentence-slots" id="sentSlots"><span style="color:var(--text-dim)">${T('sentTapWords')}</span></div>
      <div class="word-bank" id="wordBank">
        ${shuffled.map((w, i) => `<div class="word-chip" data-word="${w}" data-idx="${i}" onclick="addToSentence(this)">${w}</div>`).join('')}
      </div>
      <button class="sentence-check-btn" onclick="checkSentence()">${T('sentCheck')}</button>
      <div class="sentence-result" id="sentResult"></div>
      <button class="sentence-next-btn" id="sentNext" onclick="sentIdx++;showSentence()">${T('quizNext')}</button>
    </div>
    <p style="color:var(--text-dim);text-align:center;margin-top:10px;font-size:0.85em">${T('sentHint')} ${s.hint}</p>`;
}

function addToSentence(chipEl) {
  if (chipEl.classList.contains('in-slot')) {
    // Remove from slot
    chipEl.classList.remove('in-slot');
    sentSlots = sentSlots.filter(w => w !== chipEl.dataset.word + '_' + chipEl.dataset.idx);
  } else {
    chipEl.classList.add('in-slot');
    sentSlots.push(chipEl.dataset.word + '_' + chipEl.dataset.idx);
  }

  const slotsEl = document.getElementById('sentSlots');
  if (sentSlots.length === 0) {
    slotsEl.innerHTML = '<span style="color:var(--text-dim)">' + T('sentTapWords') + '</span>';
  } else {
    slotsEl.innerHTML = sentSlots.map(s => {
      const word = s.split('_')[0];
      return `<span style="color:var(--text);font-size:1.1em;font-weight:600">${word}</span>`;
    }).join(' ');
  }
}

function checkSentence() {
  const s = SENTENCES[sentIdx];
  const built = sentSlots.map(sl => sl.split('_')[0]);
  const correct = built.join(' ') === s.words.join(' ');
  const slotsEl = document.getElementById('sentSlots');
  const resultEl = document.getElementById('sentResult');

  if (correct) {
    slotsEl.classList.add('correct');
    resultEl.innerHTML = `<span style="color:var(--green)">${T('quizCorrect')} "${s.words.join(' ')}" = "${s.english}"</span>`;
  } else {
    slotsEl.classList.add('wrong');
    resultEl.innerHTML = `<span style="color:var(--red)">❌ ${T('sentCorrectOrder')} <strong>${s.words.join(' ')}</strong></span>`;
  }
  document.getElementById('sentNext').style.display = 'inline-block';
}

// ==================== BROWSE MODE ====================
let currentFilter = 'all';

function renderFilters() {
  const categories = ['all', ...new Set(WORDS.map(w => w.category))];
  const labels = UI.filters[currentLang];
  document.getElementById('categoryFilters').innerHTML = categories.map(c =>
    `<button class="filter-btn ${c===currentFilter?'active':''}" onclick="currentFilter='${c}';renderFilters();renderCards()">${labels[c]||c}</button>`
  ).join('');
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const words = currentFilter === 'all' ? WORDS : WORDS.filter(w => w.category === currentFilter);

  grid.innerHTML = words.map(w => {
    const t = getTranslation(w);
    const sr = getSR(w.id);
    const level = Math.min(sr.repetition, 5);
    const dots = Array.from({length:5}, (_,i) =>
      `<div class="level-dot ${i<level?'filled':''}"></div>`
    ).join('');
    const isDue = sr.dueDate <= Date.now();
    const statusText = sr.lastReview ? (isDue ? 'Due!' : `${Math.ceil((sr.dueDate-Date.now())/86400000)}d`) : 'New';

    return `
      <div class="word-card ${w.category}" onclick="this.classList.toggle('flipped')">
        <span class="category-badge">${w.category}</span>
        <button class="audio-btn" onclick="event.stopPropagation();speak('${w.cebuano}')" title="Listen">🔊</button>
        <div class="emoji">${w.emoji}</div>
        <div class="cebuano">${w.cebuano}</div>
        <div class="pronunciation">[${t.pronunciation}]</div>
        <div class="english">${t.english}</div>
        <div class="example-text">"${w.example}" — ${t.exampleEn}</div>
        <div class="mnemonic">💡 ${t.mnemonic}</div>
        <div class="level-dots">${dots}</div>
        <span class="sr-info">${statusText}</span>
      </div>`;
  }).join('');
}

// ==================== SETTINGS ====================
function loadSettings() {
  refreshSettings();
}

function saveSetting(key, value) {
  if (key === 'newPerDay' || key === 'quizCount') value = parseInt(value);
  state.settings[key] = value;
  saveState();
}

function resetProgress() {
  if (confirm(T('settingsResetConfirm'))) {
    localStorage.removeItem('cebuano_v2');
    state = loadState();
    updateStats();
    switchTab('daily');
  }
}

// ==================== INIT ====================
// Set lang buttons
document.getElementById('langRU').classList.toggle('active', currentLang === 'ru');
document.getElementById('langEN').classList.toggle('active', currentLang === 'en');
updateStats();
initDaily();
</script>
