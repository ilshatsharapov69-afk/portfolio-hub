<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Freelance Business — Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #22263a;
  --border: #2a2e3f;
  --text: #e4e4e7;
  --text-dim: #9ca3af;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,.25);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,.12);
  --yellow: #eab308;
  --yellow-bg: rgba(234,179,8,.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,.12);
}
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: radial-gradient(ellipse at 50% 0%, #1a1840 0%, #0f1117 50%);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
  padding: 14px 32px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 2px 24px rgba(99,102,241,.10);
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 2px;
}
.header-sub {
  color: var(--text-dim);
  font-size: 12px;
}
.header-stats {
  display: flex;
  gap: 14px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.stat-box {
  background: rgba(255,255,255,.05);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 8px;
  padding: 8px 14px;
  min-width: 110px;
  transition: transform .2s, box-shadow .2s;
}
.stat-box:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
}
.stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
.stat-value { font-size: 22px; font-weight: 700; color: var(--accent); }
.stat-value.green { color: var(--green); }

/* Progress bar */
.progress-bar-wrap {
  background: rgba(255,255,255,.08);
  border-radius: 4px;
  height: 6px;
  margin-top: 10px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 4px;
  transition: width .5s ease;
  box-shadow: 0 0 8px rgba(99,102,241,.3), 0 0 2px rgba(34,197,94,.2);
}

/* Controls */
.controls {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  transition: all .2s;
}
.btn:hover { background: var(--card-hover); border-color: var(--accent); }
.btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.danger { border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: var(--red-bg); }

/* Main */
.main { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }

/* Day card */
.day-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 20px;
  overflow: hidden;
  transition: all .3s ease, box-shadow .3s ease;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.day-card:hover {
  box-shadow: 0 4px 20px rgba(99,102,241,.10);
  border-color: rgba(99,102,241,.25);
}
.day-card.collapsed .day-body { display: none; }
.day-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  border-left: 3px solid transparent;
  transition: border-color .2s, background .2s;
}
.day-header:hover { background: var(--card-hover); border-left-color: var(--accent); }
.day-badge {
  background: var(--accent);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 6px;
  white-space: nowrap;
}
.day-title { flex: 1; font-weight: 600; font-size: 18px; }
.day-progress-mini {
  background: rgba(255,255,255,.08);
  border-radius: 6px;
  height: 6px;
  width: 120px;
  overflow: hidden;
}
.day-progress-mini-fill {
  height: 100%;
  background: var(--green);
  border-radius: 6px;
  transition: width .4s;
}
.day-count { font-size: 14px; color: var(--text-dim); min-width: 40px; text-align: right; }
.day-chevron { color: var(--text-dim); transition: transform .3s; font-size: 18px; }
.day-card.collapsed .day-chevron { transform: rotate(-90deg); }

.day-body { padding: 0 20px 16px; }

/* Task */
.task {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 4px;
  transition: background .2s;
  flex-wrap: wrap;
}
.task:hover { background: rgba(255,255,255,.03); }
.task.completed .task-text { text-decoration: line-through; color: var(--text-dim); }
.task.completed .task-expand-btn { font-size: 10px; opacity: .5; }
.task.completed .substep-progress { width: 50px; height: 4px; }
.task.completed .task-substeps { padding-left: 20px; }
.task.completed .substep { padding: 2px 6px; font-size: 12px; }
.task.completed .substep-checkbox { width: 16px; height: 16px; font-size: 9px; }
.task.completed .substep-text { font-size: 12px; }
.task.completed .substep-add-row { display: none; }

.task-checkbox {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
  font-size: 13px;
}
.task-checkbox:hover { border-color: var(--accent); }
.task-checkbox.checked { background: var(--green); border-color: var(--green); color: #fff; transform: scale(1.05); }
.task-checkbox.in-progress { background: var(--yellow-bg); border-color: var(--yellow); color: var(--yellow); }
.task-checkbox.cancelled { background: var(--red-bg); border-color: var(--red); color: var(--red); }

.task-content { flex: 1; min-width: 0; }
.task-text { font-size: 15px; cursor: text; }
.task-text:focus { outline: none; background: rgba(255,255,255,.05); border-radius: 4px; padding: 2px 6px; margin: -2px -6px; }
.task-meta { display: flex; gap: 8px; margin-top: 4px; align-items: center; flex-wrap: wrap; }
.task-tag {
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--blue-bg);
  color: var(--blue);
}
.task-type-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid;
  font-weight: 600;
  white-space: nowrap;
}
.task-type-badge.type-user { background: rgba(245,158,11,.12); color: #f59e0b; border-color: rgba(245,158,11,.3); }
.task-type-badge.type-claude { background: rgba(99,102,241,.12); color: #818cf8; border-color: rgba(99,102,241,.3); }
.task-type-badge.type-collab { background: rgba(34,197,94,.12); color: #22c55e; border-color: rgba(34,197,94,.3); }
.task-note-btn {
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  background: none;
  border: none;
  padding: 2px 6px;
}
.task-note-btn:hover { color: var(--accent); }
.task-note {
  margin-top: 6px;
  font-size: 14px;
  color: var(--text-dim);
  background: rgba(255,255,255,.03);
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
}
.task-note textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 14px;
  font-family: inherit;
  resize: vertical;
  min-height: 40px;
  outline: none;
}
.task-delete {
  color: var(--text-dim);
  cursor: pointer;
  opacity: 0;
  transition: opacity .2s;
  background: none;
  border: none;
  font-size: 16px;
  padding: 4px;
}
.task:hover .task-delete { opacity: 1; }
.task-delete:hover { color: var(--red); }

.task-status-menu {
  position: absolute;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  z-index: 200;
}
.task-status-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
}
.task-status-option:hover { background: var(--card-hover); }

/* Substeps expand button */
.task-expand-btn {
  font-size: 11px;
  color: var(--accent);
  cursor: pointer;
  background: none;
  border: none;
  padding: 2px 6px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.task-expand-btn:hover { color: #818cf8; }
.task-expand-btn .arrow { transition: transform .2s; display: inline-block; font-size: 9px; }
.task-expand-btn .arrow.open { transform: rotate(90deg); }

/* Substep progress mini bar */
.substep-progress {
  background: rgba(255,255,255,.08);
  border-radius: 4px;
  height: 6px;
  width: 100px;
  overflow: hidden;
  display: inline-block;
  vertical-align: middle;
  margin-left: 6px;
}
.substep-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  border-radius: 4px;
  transition: width .3s ease;
  min-width: 0%;
}

/* Substeps container */
.task-substeps {
  width: 100%;
  margin-top: 8px;
  padding-left: 30px;
  overflow: hidden;
  transition: max-height .3s ease, opacity .3s ease;
}
.task-substeps.collapsed {
  max-height: 0 !important;
  opacity: 0;
  margin-top: 0;
}
.task-substeps.expanded {
  max-height: 2000px;
  opacity: 1;
}

/* Substep row */
.substep {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 6px;
  margin-bottom: 2px;
  border-left: 2px solid var(--border);
  transition: background .2s;
}
.substep:hover { background: rgba(255,255,255,.02); border-left-color: var(--accent); }
.substep.done { opacity: .6; }
.substep.done .substep-text { text-decoration: line-through; }

.substep-checkbox {
  width: 18px;
  height: 18px;
  border-radius: 4px;
  border: 2px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  transition: all .2s;
  font-size: 11px;
}
.substep-checkbox:hover { border-color: var(--green); }
.substep-checkbox.checked { background: var(--green); border-color: var(--green); color: #fff; }

.substep-text {
  flex: 1;
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.5;
  min-width: 0;
}
.substep-text:focus { outline: none; background: rgba(255,255,255,.05); border-radius: 4px; padding: 2px 6px; margin: -2px -6px; color: var(--text); }
.substep-text code {
  background: rgba(99,102,241,.15);
  color: #a5b4fc;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 13px;
  font-family: 'Cascadia Code', 'Fira Code', monospace;
}
.substep-text a { color: var(--accent); text-decoration: none; }
.substep-text a:hover { text-decoration: underline; }

.substep-delete {
  color: var(--text-dim);
  cursor: pointer;
  opacity: 0;
  transition: opacity .2s;
  background: none;
  border: none;
  font-size: 13px;
  padding: 2px;
  flex-shrink: 0;
}
.substep:hover .substep-delete { opacity: 1; }
.substep-delete:hover { color: var(--red); }

.substep-add-row {
  display: flex;
  gap: 6px;
  padding: 4px 8px;
  margin-top: 4px;
}
.substep-add-input {
  flex: 1;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
.substep-add-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.substep-add-input::placeholder { color: rgba(255,255,255,.2); }

/* Add task */
.add-task-row {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  margin-top: 4px;
}
.add-task-input {
  flex: 1;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
}
.add-task-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.add-task-input::placeholder { color: var(--text-dim); }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(4px);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  max-width: 500px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 16px 48px rgba(0,0,0,.4);
  animation: modalIn .2s ease-out;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal h3 { margin-bottom: 16px; }
.modal textarea {
  width: 100%;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  min-height: 200px;
  outline: none;
  resize: vertical;
}
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

/* Filter pills */
.filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  transition: all .2s;
}
.pill:hover, .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 8px var(--accent-glow); }

/* Focus visible */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* Time badge */
.task-time {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 4px;
  background: rgba(255,255,255,.06);
  color: var(--text-dim);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

/* Search bar */
.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.search-input {
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px 6px 30px;
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  width: 180px;
  transition: border-color .2s, width .3s;
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); width: 240px; }
.search-input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute;
  left: 9px;
  color: var(--text-dim);
  font-size: 13px;
  pointer-events: none;
}

/* Confetti */
.confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: -20px;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  animation: confettiFall 2.5s ease-in forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* Day complete glow */
.day-card.all-done { border-color: var(--green); box-shadow: 0 0 20px rgba(34,197,94,.15); }
.day-card.all-done .day-badge { background: var(--green); }

/* Highlight search match */
.task.search-hidden, .day-card.search-hidden { display: none !important; }
mark.search-hl { background: rgba(234,179,8,.35); color: inherit; border-radius: 2px; padding: 0 1px; }

/* Project bar */
.project-bar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 32px;
  background: rgba(15,17,23,.95);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.project-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 13px;
  white-space: nowrap;
  transition: all .2s;
  font-family: inherit;
}
.project-tab:hover { background: var(--card); color: var(--text); }
.project-tab.active { background: var(--card); border-color: var(--accent); color: var(--text); box-shadow: 0 0 8px var(--accent-glow); }
.project-tab-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.project-tab-pct { font-size: 11px; color: var(--text-dim); margin-left: 2px; opacity: .7; }
.project-add-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 13px;
  white-space: nowrap;
  transition: all .2s;
  font-family: inherit;
}
.project-add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

/* Project context menu */
.project-context-menu {
  position: fixed;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  z-index: 250;
  min-width: 160px;
  display: none;
}
.project-context-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text);
}
.project-context-option:hover { background: var(--card-hover); }
.project-context-option.danger { color: var(--red); }

/* Color picker */
.color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all .2s;
}
.color-swatch:hover, .color-swatch.selected { border-color: #fff; transform: scale(1.15); }

/* Responsive */
@media (max-width: 768px) {
  .header, .main { padding: 12px 16px; }
  .header-stats { gap: 8px; }
  .stat-box { min-width: 90px; padding: 6px 10px; }
  .stat-value { font-size: 18px; }
  .day-progress-mini { width: 80px; }
  .task-substeps { padding-left: 16px; }
  .search-input { width: 140px; }
  .search-input:focus { width: 180px; }
  .project-bar { padding: 6px 16px; }
}
</style>
</head>
<body>

<div class="header">
  <h1 id="projectTitle">Loading...</h1>
  <div class="header-sub" id="projectSub"></div>
  <div class="header-stats">
    <div class="stat-box">
      <div class="stat-label">Overall Progress</div>
      <div class="stat-value" id="totalPercent">0%</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Tasks Done</div>
      <div class="stat-value green" id="totalDone">0/0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Current Day</div>
      <div class="stat-value" id="currentDay">1</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Start Date</div>
      <div class="stat-value" style="font-size:15px" id="startDate">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Done Today</div>
      <div class="stat-value green" id="doneToday">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Time Left</div>
      <div class="stat-value" style="font-size:15px" id="timeLeft">—</div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="totalProgress" style="width:0%"></div>
  </div>
  <div class="controls">
    <div class="filter-pills">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="pending">Not started</button>
      <button class="pill" data-filter="in-progress">In progress</button>
      <button class="pill" data-filter="completed">Done</button>

let state = loadState();
let activeFilter = 'all';
let statusMenuTarget = null;
let searchQuery = '';

function loadState() {
  try {
    // 1. Try multi-project key
    let raw = localStorage.getItem(STORAGE_KEY_MULTI);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.projects && parsed.projects.length > 0) {
        // Merge substeps for each project
        parsed.projects.forEach(proj => mergeSubsteps(proj));
        return parsed;
      }
    }
    // 2. Migrate from old v2 key
    raw = localStorage.getItem(OLD_STORAGE_KEY_V2);
    if (!raw) raw = localStorage.getItem(OLD_STORAGE_KEY_V1);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.plan && parsed.plan.length > 0) {
        const id = genId();
        const migrated = {
          version: 1,
          activeProjectId: id,
          projects: [{
            id: id,
            name: 'AI Freelance Business — 10-Day Plan',
            description: 'AI Voice & Text Chatbot | USA/UK/AU Clients | $100/day target',
            color: '#6366f1',
            createdAt: new Date().toISOString().slice(0,10),
            startDate: parsed.startDate || new Date().toISOString().slice(0,10),
            plan: parsed.plan
          }]
        };
        mergeSubsteps(migrated.projects[0]);
        return migrated;
      }
    }
  } catch(e) {}
  // 3. Fresh state
  const id = genId();
  return {
    version: 1,
    activeProjectId: id,
    projects: [{
      id: id,
      name: 'AI Freelance Business — 10-Day Plan',
      description: 'AI Voice & Text Chatbot | USA/UK/AU Clients | $100/day target',
      color: '#6366f1',
      createdAt: new Date().toISOString().slice(0,10),
      startDate: new Date().toISOString().slice(0,10),
      plan: JSON.parse(JSON.stringify(DEFAULT_PLAN))
    }]
  };
}

function getActiveProject() {
  return state.projects.find(p => p.id === state.activeProjectId) || state.projects[0];
}

// Merge default substeps and time into a project (for tasks that don't have them yet)
function mergeSubsteps(project) {
  const plan = project.plan || [];
  plan.forEach((day, di) => {
    day.tasks.forEach((task, ti) => {
      if (!task.substeps && DEFAULT_PLAN[di] && DEFAULT_PLAN[di].tasks[ti]) {
        task.substeps = JSON.parse(JSON.stringify(DEFAULT_PLAN[di].tasks[ti].substeps || []));
      }
      if (task.time === undefined && DEFAULT_PLAN[di] && DEFAULT_PLAN[di].tasks[ti]) {
        task.time = DEFAULT_PLAN[di].tasks[ti].time || 0;
      }
      if (!task.type && DEFAULT_PLAN[di] && DEFAULT_PLAN[di].tasks[ti]) {
        task.type = DEFAULT_PLAN[di].tasks[ti].type || '';
      }
      if (task.substepsOpen === undefined) task.substepsOpen = false;
    });
  });
  return project;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY_MULTI, JSON.stringify(state));
}

function getSubstepProgress(task) {
  if (!task.substeps || task.substeps.length === 0) return null;
  const done = task.substeps.filter(s => s.done).length;
  return { done, total: task.substeps.length, pct: Math.round(done / task.substeps.length * 100) };
}

let newProjColor = PROJECT_COLORS[0];
let contextMenuProjectId = null;

function openNewProjectModal() {
  newProjColor = PROJECT_COLORS[Math.floor(Math.random() * PROJECT_COLORS.length)];
  document.getElementById('newProjName').value = '';
  document.getElementById('newProjDesc').value = '';
  document.getElementById('newProjTemplate').checked = false;
  const updatePicker = c => { newProjColor = c; renderColorPicker('newProjColorPicker', newProjColor, updatePicker); };
  renderColorPicker('newProjColorPicker', newProjColor, updatePicker);
  document.getElementById('newProjectModal').classList.add('show');
  setTimeout(() => document.getElementById('newProjName').focus(), 100);
}

function closeNewProjectModal() {
  document.getElementById('newProjectModal').classList.remove('show');
}

function renderColorPicker(containerId, selected, onSelect) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  PROJECT_COLORS.forEach(c => {
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch' + (c === selected ? ' selected' : '');
    swatch.style.background = c;
    swatch.onclick = () => onSelect(c);
    el.appendChild(swatch);
  });
}

function doCreateProject() {
  const name = document.getElementById('newProjName').value.trim();
  if (!name) { document.getElementById('newProjName').focus(); return; }
  const desc = document.getElementById('newProjDesc').value.trim();
  const useTemplate = document.getElementById('newProjTemplate').checked;
  const id = genId();
  const newProj = {
    id,
    name,
    description: desc,
    color: newProjColor,
    createdAt: new Date().toISOString().slice(0, 10),
    startDate: new Date().toISOString().slice(0, 10),
    plan: useTemplate ? JSON.parse(JSON.stringify(DEFAULT_PLAN)) : [{ day: 'Day 1', title: 'Getting Started', tasks: [], collapsed: false }]
  };
  state.projects.push(newProj);
  state.activeProjectId = id;
  saveState();
  closeNewProjectModal();
  render();
}

function openProjectContextMenu(e, projId) {
  e.preventDefault();
  e.stopPropagation();
  contextMenuProjectId = projId;
  const menu = document.getElementById('projectContextMenu');
  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  // Keep menu in viewport
  requestAnimationFrame(() => {
    const rect = menu.getBoundingClientRect();
    if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
    if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 8) + 'px';
  });
}

function closeProjectContextMenu() {
  document.getElementById('projectContextMenu').style.display = 'none';
  contextMenuProjectId = null;
}

function renameProjectPrompt() {
  closeProjectContextMenu();
  const proj = state.projects.find(p => p.id === contextMenuProjectId);
  if (!proj) return;
  const name = prompt('Project name:', proj.name);
  if (name && name.trim()) {
    proj.name = name.trim();
    saveState();
    render();
  }
}

function editProjectDescPrompt() {
  closeProjectContextMenu();
  const proj = state.projects.find(p => p.id === contextMenuProjectId);
  if (!proj) return;
  const desc = prompt('Project description:', proj.description || '');
  if (desc !== null) {
    proj.description = desc.trim();
    saveState();
    render();
  }
}

function duplicateProject() {
  closeProjectContextMenu();
  const src = state.projects.find(p => p.id === contextMenuProjectId);
  if (!src) return;
  const id = genId();
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = id;
  copy.name = src.name + ' (Copy)';
  copy.createdAt = new Date().toISOString().slice(0, 10);
  state.projects.push(copy);
  state.activeProjectId = id;
  saveState();
  render();
}

function deleteProject() {
  closeProjectContextMenu();
  if (state.projects.length <= 1) { alert('Cannot delete the last project.'); return; }
  const proj = state.projects.find(p => p.id === contextMenuProjectId);
  if (!proj) return;
  if (!confirm('Delete project "' + proj.name + '"? This cannot be undone.')) return;
  state.projects = state.projects.filter(p => p.id !== contextMenuProjectId);
  if (state.activeProjectId === contextMenuProjectId) {
    state.activeProjectId = state.projects[0].id;
  }
  saveState();
  render();
}

function changeColorPrompt() {
  closeProjectContextMenu();
  const proj = state.projects.find(p => p.id === contextMenuProjectId);
  if (!proj) return;
  // Create a small inline color picker modal
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay show';
  overlay.innerHTML = `<div class="modal" style="max-width:320px;text-align:center;">
    <h3>Choose Color</h3>
    <div class="color-picker" style="justify-content:center;" id="changeColorPicker"></div>
    <div class="modal-actions" style="margin-top:16px;justify-content:center;">
      <button class="btn" id="changeColorCancel">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  const picker = overlay.querySelector('#changeColorPicker');
  PROJECT_COLORS.forEach(c => {
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch' + (c === proj.color ? ' selected' : '');
    swatch.style.background = c;
    swatch.onclick = () => {
      proj.color = c;
      saveState();
      render();
      overlay.remove();
    };
    picker.appendChild(swatch);
  });
  overlay.querySelector('#changeColorCancel').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
}

// ============================================
// SECTION 3: RENDERING
// ============================================
function render() {
  const proj = getActiveProject();
  const main = document.getElementById('main');
  main.innerHTML = '';

  // Update dynamic header
  document.getElementById('projectTitle').textContent = proj.name;
  document.getElementById('projectSub').textContent = proj.description || '';

  let totalTasks = 0, totalDone = 0, totalTimeLeft = 0, doneToday = 0;
  const today = new Date().toISOString().slice(0,10);

  getActiveProject().plan.forEach((day, di) => {
    const card = document.createElement('div');
    card.className = 'day-card' + (day.collapsed ? ' collapsed' : '');

    const visibleTasks = day.tasks.filter(t => activeFilter === 'all' || t.status === activeFilter);
    const dayDone = day.tasks.filter(t => t.status === 'completed').length;
    const dayTotal = day.tasks.length;
    totalTasks += dayTotal;
    totalDone += dayDone;
    const dayPct = dayTotal ? Math.round(dayDone / dayTotal * 100) : 0;

    // Count done today + time left
    day.tasks.forEach(t => {
      if (t.status !== 'completed' && t.status !== 'cancelled') totalTimeLeft += (t.time || 0);
      if (t.completedAt === today) doneToday++;
    });

    // All done glow
    if (dayDone === dayTotal && dayTotal > 0) card.classList.add('all-done');

    card.innerHTML = `
      <div class="day-header" onclick="toggleDay(${di})">
        <span class="day-badge">${day.day}</span>
        <span class="day-title" ondblclick="event.stopPropagation();this.contentEditable=true;this.focus();" onblur="this.contentEditable=false;updateDayTitle(${di},this);">${day.title}</span>
        <div class="day-progress-mini"><div class="day-progress-mini-fill" style="width:${dayPct}%"></div></div>
        <span class="day-count">${dayDone}/${dayTotal}</span>
        <span class="day-chevron">&#9660;</span>
      </div>
      <div class="day-body"></div>
    `;

    const body = card.querySelector('.day-body');
    let hasVisibleInSearch = false;

    visibleTasks.forEach((task, ti) => {
      const realIdx = day.tasks.indexOf(task);
      const taskEl = createTaskEl(di, realIdx, task);

      // Search filter
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        const textMatch = task.text.toLowerCase().includes(q);
        const tagMatch = (task.tag || '').toLowerCase().includes(q);
        const subMatch = (task.substeps || []).some(s => s.text.toLowerCase().includes(q));
        if (!textMatch && !tagMatch && !subMatch) {
          taskEl.classList.add('search-hidden');
        } else {
          hasVisibleInSearch = true;
        }
      } else {
        hasVisibleInSearch = true;
      }

      body.appendChild(taskEl);
    });

    // Hide entire day card if search finds nothing
    if (searchQuery && !hasVisibleInSearch) card.classList.add('search-hidden');

    // Add task row
    const addRow = document.createElement('div');
    addRow.className = 'add-task-row';
    addRow.innerHTML = `<input class="add-task-input" placeholder="+ Add task..." onkeydown="if(event.key==='Enter')addTask(${di},this)">`;
    body.appendChild(addRow);

    main.appendChild(card);
  });

  // Add Day button
  const addDayRow = document.createElement('div');
  addDayRow.style.cssText = 'text-align:center;padding:16px;';
  addDayRow.innerHTML = `<button class="btn" onclick="addDay()" style="opacity:.6;">+ Add Day</button>`;
  main.appendChild(addDayRow);

  // Update header stats
  document.getElementById('totalPercent').textContent = totalTasks ? Math.round(totalDone/totalTasks*100) + '%' : '0%';
  document.getElementById('totalDone').textContent = totalDone + '/' + totalTasks;
  document.getElementById('totalProgress').style.width = (totalTasks ? totalDone/totalTasks*100 : 0) + '%';
  document.getElementById('startDate').textContent = getActiveProject().startDate || '—';
  document.getElementById('doneToday').textContent = doneToday;

  // Time left
  if (totalTimeLeft >= 60) {
    const h = Math.floor(totalTimeLeft / 60);
    const m = totalTimeLeft % 60;
    document.getElementById('timeLeft').textContent = h + 'h ' + (m ? m + 'm' : '');
  } else {
    document.getElementById('timeLeft').textContent = totalTimeLeft + 'm';
  }

  // Current day
  const firstIncomplete = getActiveProject().plan.findIndex(d => d.tasks.some(t => t.status !== 'completed' && t.status !== 'cancelled'));
  document.getElementById('currentDay').textContent = firstIncomplete >= 0 ? getActiveProject().plan[firstIncomplete].day.replace('Day ','') : '✓';

  // Render project tabs
  renderProjectTabs();

  // Auto-scroll to first incomplete day
  if (firstIncomplete >= 0 && !window._hasAutoScrolled) {
    window._hasAutoScrolled = true;
    const cards = document.querySelectorAll('.day-card');
    if (cards[firstIncomplete]) {
      setTimeout(() => cards[firstIncomplete].scrollIntoView({ behavior: 'smooth', block: 'start' }), 300);
    }
  }
}

function renderProjectTabs() {
  const bar = document.getElementById('projectBar');
  bar.innerHTML = '';
  state.projects.forEach(proj => {
    const total = proj.plan.reduce((s, d) => s + d.tasks.length, 0);
    const done = proj.plan.reduce((s, d) => s + d.tasks.filter(t => t.status === 'completed').length, 0);
    const pct = total ? Math.round(done / total * 100) : 0;

    const tab = document.createElement('button');
    const isActive = proj.id === state.activeProjectId;
    tab.className = 'project-tab' + (isActive ? ' active' : '');
    if (isActive) tab.style.borderColor = proj.color;
    tab.innerHTML = `<span class="project-tab-dot" style="background:${proj.color}"></span>${proj.name}<span class="project-tab-pct">${pct}%</span>`;
    tab.onclick = () => setActiveProject(proj.id);
    tab.oncontextmenu = (e) => openProjectContextMenu(e, proj.id);
    bar.appendChild(tab);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'project-add-btn';
  addBtn.textContent = '+ New';
  addBtn.onclick = openNewProjectModal;
  bar.appendChild(addBtn);
}

function setActiveProject(id) {
  if (state.activeProjectId === id) return;
  state.activeProjectId = id;
  searchQuery = '';
  const searchInput = document.getElementById('searchInput');
  if (searchInput) searchInput.value = '';
  activeFilter = 'all';
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.filter === 'all'));
  saveState();
  render();
}

function createTaskEl(di, ti, task) {
  const el = document.createElement('div');
  el.className = 'task' + (task.status === 'completed' ? ' completed' : '');

  const checkClass = task.status === 'completed' ? 'checked' :
                     task.status === 'in-progress' ? 'in-progress' :
                     task.status === 'cancelled' ? 'cancelled' : '';

  const checkIcon = task.status === 'completed' ? '&#10003;' :
                    task.status === 'in-progress' ? '&#9654;' :
                    task.status === 'cancelled' ? '&#10005;' : '';

  const sp = getSubstepProgress(task);
  const hasSubsteps = task.substeps && task.substeps.length > 0;
  const isOpen = task.substepsOpen;

  let substepHTML = '';
  if (hasSubsteps) {
    substepHTML += `<button class="task-expand-btn" onclick="event.stopPropagation();toggleSubsteps(${di},${ti})">
      <span class="arrow ${isOpen ? 'open' : ''}">&#9654;</span>
      ${sp.done}/${sp.total} steps
      <span class="substep-progress"><span class="substep-progress-fill" style="width:${sp.pct}%"></span></span>
    </button>`;
  }

  el.innerHTML = `
    <div class="task-checkbox ${checkClass}" onclick="openStatusMenu(event,${di},${ti})">${checkIcon}</div>
    <div class="task-content">
      <div class="task-text" contenteditable="true" onblur="updateText(${di},${ti},this)">${task.text}</div>
      <div class="task-meta">
        ${task.type && TYPE_BADGES[task.type] ? `<span class="task-type-badge type-${task.type}">${TYPE_BADGES[task.type].icon} ${TYPE_BADGES[task.type].label}</span>` : ''}
        ${task.tag ? `<span class="task-tag" style="background:${(TAG_COLORS[task.tag]||{}).bg||'var(--blue-bg)'};color:${(TAG_COLORS[task.tag]||{}).color||'var(--blue)'}">${task.tag}</span>` : ''}
        ${task.time ? `<span class="task-time">${task.time >= 60 ? Math.floor(task.time/60)+'h'+(task.time%60?task.time%60+'m':'') : task.time+'m'}</span>` : ''}
        ${substepHTML}
        <button class="task-note-btn" onclick="toggleNote(this.closest('.task'),${di},${ti})">
          ${task.note ? '&#128221; note' : '+ note'}
        </button>
      </div>
      ${task.showNote || task.note ? `
        <div class="task-note">
          <textarea placeholder="Write a note..." oninput="updateNote(${di},${ti},this)">${task.note || ''}</textarea>
        </div>
      ` : ''}
    </div>
    <button class="task-delete" onclick="deleteTask(${di},${ti})" title="Delete task">&#10005;</button>
  `;

  // Render substeps
  if (hasSubsteps) {
    const substepsContainer = document.createElement('div');
    substepsContainer.className = 'task-substeps ' + (isOpen ? 'expanded' : 'collapsed');

    task.substeps.forEach((sub, si) => {
      const subEl = document.createElement('div');
      subEl.className = 'substep' + (sub.done ? ' done' : '');
      subEl.innerHTML = `
        <div class="substep-checkbox ${sub.done ? 'checked' : ''}" onclick="toggleSubstep(${di},${ti},${si})">${sub.done ? '&#10003;' : ''}</div>
        <div class="substep-text" contenteditable="true" onblur="updateSubstepText(${di},${ti},${si},this)">${sub.text}</div>
        <button class="substep-delete" onclick="deleteSubstep(${di},${ti},${si})" title="Delete step">&#10005;</button>
      `;
      substepsContainer.appendChild(subEl);
    });

    // Add substep input
    const addSubRow = document.createElement('div');
    addSubRow.className = 'substep-add-row';
    addSubRow.innerHTML = `<input class="substep-add-input" placeholder="+ Add step..." onkeydown="if(event.key==='Enter')addSubstep(${di},${ti},this)">`;
    substepsContainer.appendChild(addSubRow);

    el.appendChild(substepsContainer);
  }

  return el;
}

// ============================================
// SECTION 4: TASK & SUBSTEP OPERATIONS
// ============================================
function toggleDay(di) {
  getActiveProject().plan[di].collapsed = !getActiveProject().plan[di].collapsed;
  saveState();
  render();
}

function toggleSubsteps(di, ti) {
  getActiveProject().plan[di].tasks[ti].substepsOpen = !getActiveProject().plan[di].tasks[ti].substepsOpen;
  saveState();
  render();
}

function toggleSubstep(di, ti, si) {
  const task = getActiveProject().plan[di].tasks[ti];
  task.substeps[si].done = !task.substeps[si].done;

  // Auto-update task status based on substeps
  const allDone = task.substeps.every(s => s.done);
  const anyDone = task.substeps.some(s => s.done);

  const wasCompleted = task.status === 'completed';
  if (allDone) {
    task.status = 'completed';
    task.substepsOpen = false; // auto-collapse when done
    if (!wasCompleted) {
      task.completedAt = new Date().toISOString().slice(0,10);
      // Check if all tasks in this day are done — confetti!
      const day = getActiveProject().plan[di];
      if (day.tasks.every(t => t.status === 'completed' || t.status === 'cancelled')) {
        setTimeout(launchConfetti, 300);
      }
    }
  } else if (anyDone) {
    task.status = 'in-progress';
    task.substepsOpen = true; // auto-expand when in progress
    delete task.completedAt;
  } else {
    task.status = 'pending';
    delete task.completedAt;
  }

  saveState();
  render();
}

function addSubstep(di, ti, input) {
  const text = input.value.trim();
  if (!text) return;
  if (!getActiveProject().plan[di].tasks[ti].substeps) getActiveProject().plan[di].tasks[ti].substeps = [];
  getActiveProject().plan[di].tasks[ti].substeps.push({ text, done: false });
  input.value = '';
  saveState();
  render();
}

function deleteSubstep(di, ti, si) {
  getActiveProject().plan[di].tasks[ti].substeps.splice(si, 1);
  saveState();
  render();
}

function updateSubstepText(di, ti, si, el) {
  getActiveProject().plan[di].tasks[ti].substeps[si].text = el.innerHTML.trim();
  saveState();
}

function openStatusMenu(e, di, ti) {
  e.stopPropagation();
  const menu = document.getElementById('statusMenu');
  statusMenuTarget = { di, ti };
  menu.style.display = 'block';
  const rect = e.target.getBoundingClientRect();
  menu.style.left = rect.left + 'px';
  menu.style.top = (rect.bottom + 4) + 'px';
}

function setStatus(status) {
  if (!statusMenuTarget) return;
  const { di, ti } = statusMenuTarget;
  const task = getActiveProject().plan[di].tasks[ti];
  const wasCompleted = task.status === 'completed';
  task.status = status;
  if (status === 'completed' && !wasCompleted) {
    task.completedAt = new Date().toISOString().slice(0,10);
    // Check if all tasks in this day are done — confetti!
    const day = getActiveProject().plan[di];
    if (day.tasks.every(t => t.status === 'completed' || t.status === 'cancelled')) {
      setTimeout(launchConfetti, 300);
    }
  } else if (status !== 'completed') {
    delete task.completedAt;
  }
  saveState();
  render();
  document.getElementById('statusMenu').style.display = 'none';
  statusMenuTarget = null;
}

document.addEventListener('click', () => {
  document.getElementById('statusMenu').style.display = 'none';
  closeProjectContextMenu();
});

function updateText(di, ti, el) {
  getActiveProject().plan[di].tasks[ti].text = el.textContent.trim();
  saveState();
}

function updateNote(di, ti, el) {
  getActiveProject().plan[di].tasks[ti].note = el.value;
  saveState();
}

function toggleNote(taskEl, di, ti) {
  getActiveProject().plan[di].tasks[ti].showNote = !getActiveProject().plan[di].tasks[ti].showNote;
  saveState();
  render();
}

function addTask(di, input) {
  const text = input.value.trim();
  if (!text) return;
  getActiveProject().plan[di].tasks.push({ text, tag: '', status: 'pending', note: '', substeps: [], substepsOpen: false });
  input.value = '';
  saveState();
  render();
}

function deleteTask(di, ti) {
  getActiveProject().plan[di].tasks.splice(ti, 1);
  saveState();
  render();
}

function updateDayTitle(di, el) {
  const text = el.textContent.trim();
  if (text) getActiveProject().plan[di].title = text;
  saveState();
}

function addDay() {
  const plan = getActiveProject().plan;
  const num = plan.length + 1;
  plan.push({ day: 'Day ' + num, title: 'New Day', tasks: [], collapsed: false });
  saveState();
  render();
  // Scroll to the new day
  setTimeout(() => {
    const cards = document.querySelectorAll('.day-card');
    if (cards[cards.length - 1]) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

// ============================================
// SECTION 5: EXPAND / COLLAPSE / RESET
// ============================================
function expandAll() {
  getActiveProject().plan.forEach(d => d.collapsed = false);
  saveState();
  render();
}

function collapseAll() {
  getActiveProject().plan.forEach(d => d.collapsed = true);
  saveState();
  render();
}

// ============================================
// SECTION 6: IMPORT / EXPORT
// ============================================
function exportJSON() {
  const proj = getActiveProject();
  const exportData = { plan: proj.plan, startDate: proj.startDate, name: proj.name };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const slug = proj.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 30);
  a.download = slug + '-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importJSON() {
  document.getElementById('importModal').classList.add('show');
}

function closeImport() {
  document.getElementById('importModal').classList.remove('show');
}

function doImport() {
  try {
    const data = JSON.parse(document.getElementById('importArea').value);
    if (data.projects) {
      // New multi-project format
      state = data;
      state.projects.forEach(proj => mergeSubsteps(proj));
    } else if (data.plan) {
      // Old single-project format — import as active project's plan
      const proj = getActiveProject();
      proj.plan = data.plan;
      proj.startDate = data.startDate || proj.startDate;
      mergeSubsteps(proj);
    } else {
      alert('Invalid format');
      return;
    }
    saveState();
    render();
    closeImport();
  } catch(e) {
    alert('Invalid JSON: ' + e.message);
  }
}

function resetAll() {
  if (confirm('Reset current project progress? This cannot be undone.')) {
    const proj = getActiveProject();
    proj.plan = JSON.parse(JSON.stringify(DEFAULT_PLAN));
    proj.startDate = new Date().toISOString().slice(0,10);
    saveState();
    render();
  }
}

// ============================================
// SECTION 7: SEARCH, FILTER & EVENT LISTENERS
// ============================================

// Filter pills
document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeFilter = pill.dataset.filter;
    render();
  });
});

// Make links clickable inside contenteditable elements
document.addEventListener('click', function(e) {
  const link = e.target.closest('.task-text a, .substep-text a');
  if (link) {
    e.preventDefault();
    e.stopPropagation();
    window.open(link.href, '_blank');
  }
}, true);

// Search
function onSearch(val) {
  searchQuery = val.trim();
  render();
}

// ============================================
// SECTION 8: EFFECTS & UTILITIES
// ============================================

// Confetti celebration
function launchConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#6366f1','#22c55e','#eab308','#ef4444','#ec4899','#3b82f6','#f59e0b','#06b6d4'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 1.2 + 's';
    piece.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 4000);
}

// Auto-scroll to current day on load
function autoScrollToCurrentDay() {
  const firstIncomplete = getActiveProject().plan.findIndex(d => d.tasks.some(t => t.status !== 'completed' && t.status !== 'cancelled'));
  if (firstIncomplete > 0) {
    const cards = document.querySelectorAll('.day-card');
    if (cards[firstIncomplete]) {
      setTimeout(() => {
        cards[firstIncomplete].scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 300);
    }
  }
}

// ============================================
// SECTION 9: INITIALIZATION
// ============================================

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('show');
  });
});

// Enter key in new project modal
document.getElementById('newProjName').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doCreateProject();
});

render();
autoScrollToCurrentDay();
